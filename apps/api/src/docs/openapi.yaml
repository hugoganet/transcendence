          $ref: "#/components/responses/Unauthorized"

  /notifications/preferences:
    get:
      tags: [Notifications]
      summary: Get notification preferences
      description: Returns the user's notification preference settings.
      security:
        - sessionAuth: []
      responses:
        "200":
          description: Notification preferences
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/NotificationPreferences"
        "401":
          $ref: "#/components/responses/Unauthorized"

    patch:
      tags: [Notifications]
      summary: Update notification preferences
      description: Partially updates notification preference settings. All fields are optional.
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotificationPreferences"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/NotificationPreferences"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Mark notification as read
      description: Marks a single notification as read.
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Notification marked as read (no content)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ==================== UI Copy ====================
  /ui-copy/{locale}:
    get:
      tags: [UI Copy]
      summary: Get localized UI strings
      description: Returns all UI copy strings for the given locale. No authentication required. Cached for 1 hour.
      parameters:
        - name: locale
          in: path
          required: true
          schema:
            type: string
            enum: [en, fr]
      responses:
        "200":
          description: UI strings map
          headers:
            Cache-Control:
              schema:
                type: string
                example: "public, max-age=3600"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/UIStrings"
        "400":
          description: Invalid locale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error:
                  code: INVALID_LOCALE
                  message: Locale must be en or fr
