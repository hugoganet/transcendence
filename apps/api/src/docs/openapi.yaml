  # ==================== Exercises ====================
  /exercises/{exerciseId}/submit:
    post:
      tags: [Exercises]
      summary: Submit exercise answer
      description: |
        Submits an answer for an exercise. The request body is a discriminated union
        based on the `type` field: SI (single-input), CM (connect-matches),
        IP (item-positioning), ST (step-through).
      security:
        - sessionAuth: []
      parameters:
        - name: exerciseId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/SISubmission"
                - $ref: "#/components/schemas/CMSubmission"
                - $ref: "#/components/schemas/IPSubmission"
                - $ref: "#/components/schemas/STSubmission"
              discriminator:
                propertyName: type
                mapping:
                  SI: "#/components/schemas/SISubmission"
                  CM: "#/components/schemas/CMSubmission"
                  IP: "#/components/schemas/IPSubmission"
                  ST: "#/components/schemas/STSubmission"
      responses:
        "200":
          description: Exercise result with feedback
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ExerciseResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /exercises/missions/{missionId}/status:
    get:
      tags: [Exercises]
      summary: Get mission exercise status
      description: Returns exercise completion status for a mission (attempts, completability).
      security:
        - sessionAuth: []
      parameters:
        - name: missionId
          in: path
          required: true
          schema:
            type: string
            pattern: '^\d+\.\d+\.\d+$'
          description: "Mission ID in X.Y.Z format"
      responses:
        "200":
          description: Mission exercise status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
